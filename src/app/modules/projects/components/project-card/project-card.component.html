<div class="project-card" [attr.data-aos]="'fade-up'" [attr.data-aos-delay]="aosDelay" data-aos-duration="1200"
    data-aos-easing="ease-in-out">
    <!-- Optional Thumbnail -->
    <img *ngIf="project.image" [src]="project.image" alt="{{ project.title }}" class="project-img" />

    <h3>{{ project.title }}</h3>
    <p>{{ project.description }}</p>

    <ul class="tech-stack">
        <li *ngFor="let tech of project.techStack">{{ tech }}</li>
    </ul>

    <div class="project-links">
        <a *ngIf="project.github" [href]="project.github" class="btn icon-btn" target="_blank"
            rel="noopener noreferrer">
            <i class="pi pi-github"></i> GitHub
        </a>
        <a *ngIf="project.demo" [href]="project.demo" class="btn-outline icon-btn" target="_blank"
            rel="noopener noreferrer">
            <i class="pi pi-external-link"></i> Demo
        </a>
    </div>
</div>
